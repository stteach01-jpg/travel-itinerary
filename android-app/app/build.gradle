plugins {
    id "com.android.application"
}

android {
    namespace "com.stteach.travelitinerary"
    compileSdk 35

    defaultConfig {
        applicationId "com.stteach.travelitinerary"
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }
}

tasks.register("copyWebAssets", Copy) {
    from(rootProject.file("../index.html"))
    from(rootProject.file("../styles.css"))
    from(rootProject.file("../script.js"))
    into(layout.projectDirectory.dir("src/main/assets/www"))
}

preBuild.dependsOn("copyWebAssets")
